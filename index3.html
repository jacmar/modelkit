<style>
        .halftone {
            background-image: radial-gradient(circle, #000000 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.1;

        .comic-border {
            border: 4px solid black;
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }

        .stamp-badge {
            transform: rotate(-2deg);
            border: 3px solid currentColor;
            padding: 2px 8px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .speed-lines {
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.05) 10px,
                rgba(0,0,0,0.05) 11px
            );

        @media print {
            .no-print, nav, aside, button, .search-bar-container {
                display: none !important;
            }

                background: white !important;
                padding: 0 !important;

            .comic-border {

                border-width: 2px !important;

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface font-body text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white dark:bg-zinc-900 border-b-4 border-black dark:border-white shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] dark:shadow-[8px_8px_0px_0px_rgba(255,255,255,0.2)]">
<div class="flex items-center gap-4">
<h1 class="text-4xl font-black italic uppercase tracking-tighter text-black dark:text-white underline decoration-4 underline-offset-8 font-headline">
                LA COLLEZIONE
            </h1>
</div>
<div class="hidden md:flex flex-1 max-w-xl mx-8 search-bar-container">
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary">search</span>
<input class="w-full bg-surface-container-lowest border-b-4 border-black p-3 pl-12 font-headline uppercase font-bold focus:outline-none focus:ring-0" id="searchInput" placeholder="CERCA MODELLO O MARCA..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="bg-black text-white px-6 py-2 font-headline font-black italic uppercase tracking-tighter border-2 border-black hover:bg-white hover:text-black transition-all active:translate-x-1 active:translate-y-1 active:shadow-none no-print" onclick="window.print()">
                ESPORTA PDF
            </button>
</div>
</header>
<!-- SideNavBar -->
<aside class="hidden md:flex flex-col fixed left-0 top-24 h-[calc(100vh-6rem)] z-40 border-r-4 border-black dark:border-white w-64 bg-zinc-50 dark:bg-zinc-950 no-print">
<div class="p-6 border-b-4 border-black">
<p class="font-headline font-black text-xl text-black">GARAGE SPECS</p>
<p class="font-headline text-xs font-bold opacity-60">VINTAGE SCALE MODELLING</p>
</div>
<nav class="flex-1 py-4 overflow-y-auto">
<ul class="space-y-1 px-2">
<li>
<button class="w-full bg-black text-white p-3 flex items-center gap-3 font-headline font-bold uppercase text-sm transition-none active-nav-item" onclick="filterByStatus('all')">
<span class="material-symbols-outlined">dashboard</span> Overview
                    </button>
</li>
<li>
<button class="w-full text-black p-3 flex items-center gap-3 font-headline font-bold uppercase text-sm hover:bg-zinc-200" onclick="filterByStatus('Done')">
<span class="material-symbols-outlined">check_circle</span> Done
                    </button>
</li>
<li>
<button class="w-full text-black p-3 flex items-center gap-3 font-headline font-bold uppercase text-sm hover:bg-zinc-200" onclick="filterByStatus('Doing')">
<span class="material-symbols-outlined">construction</span> Doing
                    </button>
</li>
<li>
<button class="w-full text-black p-3 flex items-center gap-3 font-headline font-bold uppercase text-sm hover:bg-zinc-200" onclick="filterByStatus('Studying')">
<span class="material-symbols-outlined">menu_book</span> Studying
                    </button>
</li>
<li>
<button class="w-full text-black p-3 flex items-center gap-3 font-headline font-bold uppercase text-sm hover:bg-zinc-200" onclick="filterByStatus('Wishlist')">
<span class="material-symbols-outlined">star</span> Wishlist
                    </button>
</li>
</ul>
</nav>
<div class="p-4 border-t-4 border-black text-[10px] font-headline font-bold opacity-40 uppercase">
            © 1974 Racing Archives
        </div>
</aside>
<!-- Main Content -->
<main class="md:ml-64 mt-28 p-8 min-h-screen speed-lines">
<!-- Stats Row -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12 no-print">
<div class="comic-border bg-white p-6 relative overflow-hidden group">
<div class="halftone absolute inset-0"></div>
<div class="relative z-10">
<p class="font-headline font-black text-4xl mb-1" id="stat-total">0</p>
<p class="font-headline font-bold text-xs uppercase tracking-widest text-secondary">Totale Kit</p>
</div>
<span class="material-symbols-outlined absolute -bottom-2 -right-2 text-6xl opacity-10 group-hover:scale-110 transition-transform">inventory_2</span>
</div>
<div class="comic-border bg-white p-6 relative overflow-hidden group border-black">
<div class="halftone absolute inset-0"></div>
<div class="relative z-10">
<p class="font-headline font-black text-4xl mb-1" id="stat-done">0</p>
<p class="font-headline font-bold text-xs uppercase tracking-widest text-secondary">Completati</p>
</div>
<span class="material-symbols-outlined absolute -bottom-2 -right-2 text-6xl opacity-10 group-hover:scale-110 transition-transform">verified</span>
</div>
<div class="comic-border bg-white p-6 relative overflow-hidden group">
<div class="halftone absolute inset-0"></div>
<div class="relative z-10">
<p class="font-headline font-black text-4xl mb-1" id="stat-doing">0</p>
<p class="font-headline font-bold text-xs uppercase tracking-widest text-secondary">In Lavoro</p>
</div>
<span class="material-symbols-outlined absolute -bottom-2 -right-2 text-6xl opacity-10 group-hover:scale-110 transition-transform">settings_slow_motion</span>
</div>
<div class="comic-border bg-white p-6 relative overflow-hidden group">
<div class="halftone absolute inset-0"></div>
<div class="relative z-10">
<p class="font-headline font-black text-4xl mb-1" id="stat-wishlist">0</p>
<p class="font-headline font-bold text-xs uppercase tracking-widest text-secondary">Desideri</p>
</div>
<span class="material-symbols-outlined absolute -bottom-2 -right-2 text-6xl opacity-10 group-hover:scale-110 transition-transform">auto_awesome</span>
</div>
</div>
<!-- Dashboard Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10" id="kitsGrid">
<!-- Loader Placeholder -->
<div class="col-span-full py-20 text-center">
<div class="inline-block animate-spin font-black text-4xl">⚙️</div>
<p class="font-headline font-black uppercase mt-4 text-xl italic">Caricamento Archivio...</p>
</div>
</div>
</main>
<!-- Photo Upload Modal -->
<div class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/80 backdrop-blur-sm p-4" id="photoModal">
<div class="bg-white comic-border w-full max-w-md p-8 relative">
<button class="absolute top-4 right-4 text-primary hover:scale-125 transition-transform" onclick="closePhotoModal()">
<span class="material-symbols-outlined font-black">close</span>
</button>
<h2 class="font-headline font-black text-2xl uppercase italic mb-6 underline decoration-4 underline-offset-4">Carica Foto Modello</h2>
<div class="space-y-6">
<div class="border-4 border-dashed border-zinc-300 p-8 text-center bg-zinc-50 hover:bg-zinc-100 transition-colors cursor-pointer" id="dropZone">
<span class="material-symbols-outlined text-5xl mb-2 text-zinc-400">add_a_photo</span>
<p class="font-headline font-bold text-sm uppercase">Trascina o Clicca per Caricare</p>
<input accept="image/*" class="hidden" id="photoInput" type="file"/>
</div>
<div class="hidden" id="photoPreview">
<img alt="Preview" class="w-full h-48 object-cover comic-border" data-alt="Anteprima della foto del modello caricato" id="previewImg" src=""/>
<button class="w-full mt-4 bg-black text-white font-headline font-black py-3 uppercase italic text-lg shadow-[4px_4px_0px_0px_rgba(0,0,0,0.3)]" onclick="savePhoto()">Salva Foto</button>
</div>
</div>
</div>
</div>
<script>
        // CONFIGURAZIONE DATI
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTo_f-m4H6U7v7Oq8qW6J0yXU7aQz8O_Yv-w-v-W-L-v-E-V-H-A-Q-S-G-Z-J-X-H-Q/pub?output=csv';
        let allKits = [];
        let currentEditingId = null;

        // CARICAMENTO DATI
        async function fetchKits() {
            try {
                // In un ambiente reale, usiamo PapaParse o fetch()
                // Simuliamo il caricamento per lo sviluppo della UI se l'URL non è raggiungibile
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                parseCSV(csvText);
            } catch (error) {
                console.error('Error loading kits:', error);
                // Fallback demo data
                allKits = [
                    { id: '1', brand: 'Tamiya', model: 'Porsche 934 RSR', scale: '1:24', status: 'Done', notes: 'Orange Jägermeister livery' },
                    { id: '2', brand: 'Fujimi', model: 'Ferrari 288 GTO', scale: '1:24', status: 'Doing', notes: 'Engine detailing in progress' },
                    { id: '3', brand: 'Revell', model: 'BMW M1 Procar', scale: '1:24', status: 'Wishlist', notes: 'Classic BBS wheels needed' },
                    { id: '4', brand: 'Hasegawa', model: 'Lancia Stratos HF', scale: '1:24', status: 'Studying', notes: 'Researching Alitalia decals' }
                ];
                renderKits(allKits);
                updateStats();
            }
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',');
            allKits = lines.slice(1).map((line, index) => {
                const values = line.split(',');
                return {
                    id: index.toString(),
                    brand: values[0] || 'Unknown',
                    model: values[1] || 'Unknown',
                    scale: values[2] || '1:24',
                    status: (values[3] || 'Wishlist').trim(),
                    notes: values[4] || ''
                };
            });
            renderKits(allKits);
            updateStats();
        }

        // RENDERING
        function renderKits(kits) {
            const grid = document.getElementById('kitsGrid');
            grid.innerHTML = kits.map(kit => {
                const photo = localStorage.getItem(`photo_${kit.id}`) || `https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=800&auto=format&fit=crop`;
                const statusColor = getStatusColor(kit.status);
                
                return `
                    <div class="bg-white comic-border flex flex-col group hover:-translate-y-2 transition-transform duration-200">
                        <!-- Card Header / Image -->
                        <div class="relative h-48 overflow-hidden border-b-4 border-black">
                            <div class="halftone absolute inset-0 z-10 pointer-events-none"></div>
                            <img src="${photo}" alt="${kit.model}" class="w-full h-full object-cover grayscale contrast-125" data-alt="Immagine in bianco e nero del modello ${kit.model}">
                            <div class="absolute top-2 right-2 z-20">
                                <span class="stamp-badge bg-white ${statusColor} text-xs">${kit.status}</span>
                            </div>
                            <button onclick="openPhotoModal('${kit.id}')" class="absolute bottom-2 right-2 z-20 bg-black text-white p-2 no-print opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="material-symbols-outlined text-sm">photo_camera</span>
                            </button>
                        </div>

                        <!-- Card Body -->
                        <div class="p-4 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-headline font-black text-2xl uppercase italic tracking-tighter leading-none mb-1">${kit.model}</h3>
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="bg-zinc-200 px-2 py-0.5 text-[10px] font-headline font-black uppercase tracking-tighter">${kit.brand}</span>
                                    <span class="bg-black text-white px-2 py-0.5 text-[10px] font-headline font-black uppercase tracking-tighter">${kit.scale}</span>
                                </div>
                                <p class="text-xs font-medium text-secondary italic border-l-2 border-zinc-300 pl-2 py-1">${kit.notes || 'Nessuna nota aggiuntiva.'}</p>
                            </div>
                            
                            <!-- Action Footer -->
                            <div class="mt-4 pt-4 border-t-2 border-black border-dotted flex justify-between items-center no-print">
                                <span class="text-[10px] font-headline font-bold opacity-30">REF: #${kit.id.padStart(4, '0')}</span>
                                <div class="flex gap-2">
                                    <button class="p-1 hover:bg-black hover:text-white transition-colors"><span class="material-symbols-outlined text-sm">edit</span></button>
                                    <button class="p-1 hover:bg-black hover:text-white transition-colors"><span class="material-symbols-outlined text-sm">visibility</span></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusColor(status) {
            switch(status.toLowerCase()) {
                case 'done': return 'text-green-800 border-green-800';
                case 'doing': return 'text-blue-800 border-blue-800';
                case 'studying': return 'text-orange-800 border-orange-800';
                case 'wishlist': return 'text-zinc-500 border-zinc-500';
                default: return 'text-black border-black';
            }
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = allKits.length;
            document.getElementById('stat-done').innerText = allKits.filter(k => k.status.toLowerCase() === 'done').length;
            document.getElementById('stat-doing').innerText = allKits.filter(k => k.status.toLowerCase() === 'doing').length;
            document.getElementById('stat-wishlist').innerText = allKits.filter(k => k.status.toLowerCase() === 'wishlist').length;
        }

        // FILTRI E RICERCA
        function filterByStatus(status) {
            // UI Visual Feedback
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-black', 'text-white');
                btn.classList.add('text-black');
            });
            event.currentTarget.classList.add('bg-black', 'text-white');

            if (status === 'all') {
                renderKits(allKits);
            } else {
                const filtered = allKits.filter(k => k.status.toLowerCase() === status.toLowerCase());
                renderKits(filtered);
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allKits.filter(k => 
                k.model.toLowerCase().includes(term) || 
                k.brand.toLowerCase().includes(term)
            );
            renderKits(filtered);
        });

        // GESTIONE FOTO (LocalStorage)
        function openPhotoModal(id) {
            currentEditingId = id;
            document.getElementById('photoModal').classList.remove('hidden');
        }

        function closePhotoModal() {
            document.getElementById('photoModal').classList.add('hidden');
            document.getElementById('photoPreview').classList.add('hidden');
            document.getElementById('previewImg').src = '';
            currentEditingId = null;
        }

        const photoInput = document.getElementById('photoInput');
        const dropZone = document.getElementById('dropZone');

        dropZone.onclick = () => photoInput.click();

        photoInput.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('previewImg').src = event.target.result;
                    document.getElementById('photoPreview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        function savePhoto() {
            const base64 = document.getElementById('previewImg').src;
            if (currentEditingId && base64) {
                localStorage.setItem(`photo_${currentEditingId}`, base64);
                renderKits(allKits); // Refresh grid
                closePhotoModal();
            }
        }

        // INIT
        window.onload = fetchKits;
    </script>
</body></html>
