<!DOCTYPE html>

<html lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LA COLLEZIONE — Vintage Scale Modelling</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS for utility and layout -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
:root {
  --primary: #000000;
  --surface: #ffffff;
  --accent: #000000;
  --border-width: 4px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { 
    background: #fdfdfd; 
    color: var(--primary); 
    font-family: 'Space Grotesk', sans-serif;
    -webkit-font-smoothing: antialiased;
}

/* Comic / Ink Aesthetics */
.halftone {
    background-image: radial-gradient(circle, #000000 1px, transparent 1px);
    background-size: 4px 4px;
    opacity: 0.05;
}

.speed-lines {
    background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 10px,
        rgba(0,0,0,0.03) 10px,
        rgba(0,0,0,0.03) 11px
    );
}

.comic-border {
    border: var(--border-width) solid black;
    box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
}

.stamp-badge {
    transform: rotate(-3deg);
    border: 3px solid currentColor;
    padding: 2px 8px;
    font-weight: 900;
    text-transform: uppercase;
    display: inline-block;
}

/* HERO */
.hero {
    position: relative;
    padding: 6rem 3rem 4rem;
    background: white;
    border-bottom: var(--border-width) solid black;
    overflow: hidden;
}

.hero h1 {
    font-weight: 900;
    font-size: clamp(3rem, 8vw, 6rem);
    line-height: .9;
    letter-spacing: -.05em;
    text-transform: uppercase;
    font-style: italic;
    text-decoration: underline;
    text-decoration-thickness: 8px;
    text-underline-offset: 12px;
}

.hero-sub {
    font-weight: 700;
    font-size: 1.2rem;
    margin-top: 2rem;
    letter-spacing: .1em;
    text-transform: uppercase;
}

.hero-stats {
    display: flex;
    gap: 2rem;
    margin-top: 3rem;
    flex-wrap: wrap;
}

.hs-n { font-weight: 900; font-size: 3rem; line-height: 1; }
.hs-l { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-top: 4px; opacity: 0.6; }

/* TOOLBAR */
.toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: white;
    border-bottom: var(--border-width) solid black;
    padding: 1rem 3rem;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
}

.si {
    padding: 10px 15px;
    background: white;
    border: 3px solid black;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    width: 250px;
    text-transform: uppercase;
}

.si:focus { outline: none; background: #ffff00; }

.fg { display: flex; gap: 4px; }
.fb {
    padding: 6px 12px;
    font-size: .75rem;
    font-weight: 800;
    text-transform: uppercase;
    background: white;
    border: 2px solid black;
    cursor: pointer;
    transition: .1s;
}
.fb:hover, .fb.a { background: black; color: white; }

.sb {
    padding: 8px 16px;
    font-size: .75rem;
    font-weight: 800;
    text-transform: uppercase;
    background: black;
    color: white;
    border: 2px solid black;
    cursor: pointer;
}

/* ESPORTA PDF BUTTON */
.export-btn {
    margin-left: auto;
    background: #000;
    color: #fff;
    padding: 10px 20px;
    font-weight: 900;
    text-transform: uppercase;
    font-style: italic;
    border: 3px solid #000;
    transition: all 0.2s;
}
.export-btn:hover {
    background: #fff;
    color: #000;
    box-shadow: 4px 4px 0px #000;
    transform: translate(-2px, -2px);
}

/* GRID & CARDS */
.gc { padding: 3rem; }
.gr { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; }

.card {
    background: white;
    border: var(--border-width) solid black;
    box-shadow: 10px 10px 0px 0px rgba(0,0,0,1);
    transition: .15s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}
.card:hover { transform: translate(-4px, -4px); box-shadow: 14px 14px 0px 0px rgba(0,0,0,1); }

.cv { 
    width: 100%; 
    height: 200px; 
    position: relative; 
    border-bottom: var(--border-width) solid black; 
    background: #eee;
    overflow: hidden;
}
.cv img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(120%); }
.cv .cn { 
    font-weight: 900; font-size: 1.5rem; text-transform: uppercase; font-style: italic; 
    padding: 20px; line-height: 1; position: relative; z-index: 2;
}

.badge {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 10;
}

.b-done { color: #1a5c1a; }
.b-wip { color: #8a5a00; }
.b-studying { color: #4a1a8a; }
.b-collecting { color: #8a1a4a; }
.b-todo { color: #333; }

/* CARD BODY */
.cb { padding: 20px; position: relative; background: white; }
.cb .nm { font-weight: 900; font-size: 1.4rem; line-height: 1.1; text-transform: uppercase; margin-bottom: 8px; }
.cb .yr { font-weight: 800; font-size: 1rem; color: #000; opacity: 0.5; margin-bottom: 12px; }
.cb .pill { 
    display: inline-block; padding: 2px 8px; border: 2px solid black; font-weight: 800; 
    font-size: 0.7rem; text-transform: uppercase; margin-right: 4px; margin-bottom: 4px;
}
.mood { 
    font-weight: 500; font-size: .85rem; margin-top: 15px; border-top: 2px dashed #000; 
    padding-top: 10px; font-style: italic; max-height: 0; overflow: hidden; transition: .3s;
}
.card.exp .mood { max-height: 300px; }

/* SECTIONS */
.sec { padding: 4rem 3rem; border-top: var(--border-width) solid black; }
.st { font-weight: 900; font-size: 2.5rem; text-transform: uppercase; font-style: italic; margin-bottom: 2rem; }

/* TIMELINE */
.tl { position: relative; padding-left: 50px; }
.tl::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 6px; background: black; }
.ti { position: relative; margin-bottom: 3rem; }
.td { 
    position: absolute; left: -44px; top: 4px; width: 24px; height: 24px; 
    background: white; border: 6px solid black; 
}

/* BUTTONS */
.pb {
    padding: 15px 35px;
    background: black;
    color: white;
    border: none;
    font-weight: 900;
    font-size: 1.1rem;
    text-transform: uppercase;
    font-style: italic;
    cursor: pointer;
    box-shadow: 8px 8px 0px #ccc;
}
.pb:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0px #ccc; }

footer { padding: 3rem; border-top: var(--border-width) solid black; text-align: center; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; }

@media print {
    .toolbar, .pb, .cu, .cl, .export-btn, footer { display: none !important; }
    .card { box-shadow: none !important; border-width: 2px !important; break-inside: avoid; }
    .hero { border-bottom-width: 2px !important; }
}
</style>
</head>
<body class="speed-lines">
<section class="hero">
<div class="halftone absolute inset-0"></div>
<div class="relative z-10">
<h1>La <span>Collezione</span></h1>
<p class="hero-sub">Inventario modelli • Piano di montaggio</p>
<div class="hero-stats" id="hs"></div>
</div>
</section>
<div class="toolbar no-print">
<input class="si" id="si" placeholder="CERCA MODELLO..." type="text"/>
<div class="fg" data-f="status">
<button class="fb a" data-v="all">Tutti</button>
<button class="fb" data-v="done">Finito</button>
<button class="fb" data-v="wip">Lavorando</button>
<button class="fb" data-v="studying">Studio</button>
</div>
<div class="fg" data-f="scala">
<button class="fb a" data-v="all">Tutte Scale</button>
<button class="fb" data-v="1:12">1:12</button>
<button class="fb" data-v="1:24">1:24</button>
</div>
<button class="sb" id="sortBtn" onclick="toggleSort()">↕ ANNO</button>
<button class="export-btn" onclick="window.print()">ESPORTA PDF</button>
</div>
<div class="gc">
<div class="gr" id="grid">
<!-- JS will populate this -->
</div>
</div>
<input accept="image/*" class="hidden" id="fi" onchange="onUpload(event)" type="file"/>
<section class="sec" id="tlSec">
<h2 class="st">Piano di montaggio</h2>
<div class="tl" id="tl"></div>
</section>
<section class="sec no-print">
<h2 class="st">Pianifica i prossimi 5</h2>
<button class="pb" onclick="copyPrompt()">◆ Copia prompt per AI</button>
<div class="hidden mt-4 font-bold uppercase text-sm" id="pc">Prompt copiato negli appunti!</div>
</section>
<section class="sec" id="galSec">
<h2 class="st">Archivio Storico — completati</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="gal"></div>
</section>
<footer id="ft">VINTAGE SCALE MODELLING 1974-2024</footer>
<script>
// Logic preserved exactly from source TEXT_3
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR3LOoOLJqM-vqm7XZkEn3cOWQEV3yeXqAQf0zXkmKAJEKOm6wWUK9WJLypbFJAKw63cp8429DrNgb3/pub?gid=1076143511&single=true&output=csv';

let photoCache = {};
function loadPhotos() {
  try {
    photoCache = JSON.parse(localStorage.getItem('modelli_foto') || '{}');
    const old = localStorage.getItem('mp');
    if (old) {
      const parsed = JSON.parse(old);
      photoCache = { ...parsed, ...photoCache };
      localStorage.setItem('modelli_foto', JSON.stringify(photoCache));
      localStorage.removeItem('mp');
    }
  } catch { photoCache = {}; }
}

function savePhoto(key, dataUrl) {
  photoCache[key] = dataUrl;
  try { localStorage.setItem('modelli_foto', JSON.stringify(photoCache)); } catch (e) {
    const keys = Object.keys(photoCache);
    if (keys.length > 1) { delete photoCache[keys[0]]; photoCache[key] = dataUrl; try { localStorage.setItem('modelli_foto', JSON.stringify(photoCache)); } catch {} }
  }
}

let utk = null;
function onUpload(e) {
  const f = e.target.files[0];
  if (!f || !utk) return;
  const r = new FileReader();
  r.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const c = document.createElement('canvas');
      const M = 800;
      let w = img.width, h = img.height;
      if (w > M || h > M) { const s = Math.min(M/w, M/h); w *= s; h *= s; }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      savePhoto(utk, c.toDataURL('image/jpeg', .85));
      rg(); rgal();
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
  e.target.value = '';
}

function tu(k, ev) { ev.stopPropagation(); utk = k; document.getElementById('fi').click(); }

function pcl(l) {
  const f = []; let i = 0, fd = '', q = false;
  while (i < l.length) {
    const c = l[i];
    if (q) { if (c === '"') { if (i+1 < l.length && l[i+1] === '"') { fd += '"'; i += 2; } else { q = false; i++; } } else { fd += c; i++; } }
    else { if (c === '"') { q = true; i++; } else if (c === ',') { f.push(fd.trim()); fd = ''; i++; } else { fd += c; i++; } }
  }
  f.push(fd.trim()); return f;
}

function pcsv(t) {
  const ls = t.split(/\r?\n/).filter(l => l.trim());
  if (ls.length < 2) return null;
  const h = pcl(ls[0]); const ms = [];
  for (let i = 1; i < ls.length; i++) {
    const v = pcl(ls[i]); const r = {}; h.forEach((hh, j) => { r[hh] = v[j] || ''; });
    const n = r['Modello'] || ''; if (!n) continue;
    const mood = r['mood'] || ''; const rs = (r['status'] || '').toLowerCase().trim();
    let st = 'todo';
    if (rs === 'done') st = 'done'; else if (rs === 'doing') st = 'wip';
    else if (rs === 'studying') st = 'studying'; else if (rs === 'on hold') st = 'onhold';
    else if (rs === 'collecting') st = 'collecting'; else if (rs) st = rs;
    ms.push({ name: n, scala: r['Scala'] || '', tipo: r['Tipologia'] || '', anno: parseInt(r['Anno']) || 0, brand: r['Brand'] || '', mood: st === 'done' ? '' : mood, status: st, order: parseInt(r['Order']) || 0, start: r['Start'] || '', link: r['Link'] || '' });
  }
  return ms.length ? ms : null;
}

async function load(u) {
  try { const r = await fetch(u); if (!r.ok) return null; const t = await r.text(); if (t.includes('<!DOCTYPE')) return null; return pcsv(t); }
  catch { return null; }
}

let M = [], F = { status: 'all', tipo: 'all', scala: 'all' }, S = '', SM = 'status', EK = null;
const SL = { done: 'DONE', wip: 'WIP', studying: 'RESEARCH', collecting: 'WISH', onhold: 'HOLD', todo: 'QUEUE' };
const SO = { wip: 0, studying: 1, collecting: 2, onhold: 3, todo: 4, done: 5 };

function mf(m) {
  if (F.status !== 'all' && m.status !== F.status) return false;
  if (F.tipo !== 'all') { if (F.tipo === 'other') { if (['Formula 1', 'Endurance'].includes(m.tipo)) return false; } else if (m.tipo !== F.tipo) return false; }
  if (F.scala !== 'all' && m.scala !== F.scala) return false;
  if (S && !m.name.toLowerCase().includes(S)) return false;
  return true;
}

function rs() {
  const c = {}; M.forEach(m => { c[m.status] = (c[m.status] || 0) + 1; });
  document.getElementById('hs').innerHTML = [
    ['done', 'black'], ['wip', 'black'], ['studying', 'black']
  ].map(([k, col]) => `<div><div class="hs-n">${c[k]||0}</div><div class="hs-l">${SL[k]||k}</div></div>`).join('') +
  `<div><div class="hs-n">${M.length}</div><div class="hs-l">TOTALE</div></div>`;
}

function rtl() {
  const its = [];
  M.filter(m => m.status === 'wip').forEach(m => its.push({...m, ts: 'w'}));
  M.filter(m => m.status === 'studying').forEach(m => its.push({...m, ts: 's'}));
  M.filter(m => m.order > 0 && m.status !== 'done' && m.status !== 'wip').sort((a, b) => a.order - b.order).forEach(m => its.push({...m, ts: 'p'}));
  const el = document.getElementById('tl'), sec = document.getElementById('tlSec');
  if (!its.length) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  el.innerHTML = its.map(m => `<div class="ti">
    <div class="td"></div>
    <div class="font-bold text-xs uppercase tracking-widest opacity-50 mb-1">${m.ts==='p'&&m.order?'#'+m.order+' — '+m.start:m.ts==='w'?'doing':'studying'}</div>
    <div class="font-black text-xl italic uppercase underline decoration-2 underline-offset-4">${m.name}</div>
    <div class="mt-2 text-sm font-bold opacity-60">${m.mood||m.brand} | ${m.scala}</div>
  </div>`).join('');
}

function rg() {
  let fl = M.filter(mf);
  if (SM === 'status') fl.sort((a, b) => { const sa = SO[a.status] ?? 4, sb = SO[b.status] ?? 4; return sa !== sb ? sa - sb : a.name.localeCompare(b.name); });
  else fl.sort((a, b) => (a.anno || 9999) - (b.anno || 9999));
  
  document.getElementById('grid').innerHTML = fl.map(m => {
    const k = m.name + '|' + m.scala;
    const ex = EK === k;
    const lb = SL[m.status] || 'QUEUE';
    const p = photoCache[k];
    return `<div class="card${ex?' exp':''}" onclick="tgc('${k.replace(/'/g,"\\'")}')">
      <div class="halftone absolute inset-0 pointer-events-none"></div>
      <div class="cv">
        ${p ? `<img src="${p}">` : `<div class="cn">${m.name}</div>`}
        <span class="badge stamp-badge bg-white b-${m.status}">${lb}</span>
        <button onclick="tu('${k.replace(/'/g,"\\'")}',event)" class="absolute bottom-2 right-2 bg-black text-white p-2 no-print">
            <span class="material-symbols-outlined text-sm">photo_camera</span>
        </button>
      </div>
      <div class="cb">
        <div class="nm">${m.name}</div>
        ${m.anno ? `<div class="yr">${m.anno} &bull; ${m.brand}</div>` : `<div class="yr">${m.brand}</div>`}
        <div class="mt-2 flex flex-wrap"><span class="pill">${m.scala}</span><span class="pill">${m.tipo}</span></div>
        ${m.mood ? `<div class="mood">${m.mood}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function rgal() {
  const d = M.filter(m => m.status === 'done').sort((a, b) => (b.anno||0) - (a.anno||0));
  const sec = document.getElementById('galSec');
  if (!d.length) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  document.getElementById('gal').innerHTML = d.map(m => {
    const k = m.name + '|' + m.scala;
    const p = photoCache[k];
    return `<div class="comic-border bg-white p-2 aspect-square relative overflow-hidden flex items-center justify-center">
      ${p ? `<img src="${p}" class="w-full h-full object-cover filter grayscale">` : `<div class="text-center font-black p-4 text-xs italic uppercase">${m.name}</div>`}
      <div class="absolute bottom-1 right-1 stamp-badge bg-white text-[8px] scale-75">DONE</div>
    </div>`;
  }).join('');
}

function tgc(k) { EK = EK === k ? null : k; rg(); }
function toggleSort() { SM = SM === 'status' ? 'anno' : 'status'; document.getElementById('sortBtn').textContent = SM === 'status' ? '↕ ANNO' : '↕ STATO'; rg(); }

function copyPrompt() {
  const doing = M.filter(m => m.status === 'wip').map(m => m.name).join(', ');
  const done = M.filter(m => m.status === 'done').map(m => m.name).join(', ');
  const av = M.filter(m => !['done','wip'].includes(m.status)).map(m => `- ${m.name} | ${m.anno} | ${m.scala}`).join('\n');
  const pr = `AI Suggerimento: Prossimi 5 modelli.\nCOSTRUZIONE: ${doing}\nFINITI: ${done}\nDISPONIBILI:\n${av}`;
  navigator.clipboard.writeText(pr).then(() => {
    const el = document.getElementById('pc');
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 5000);
  });
}

document.querySelectorAll('.fg').forEach(g => {
  const fn = g.dataset.f;
  g.querySelectorAll('.fb').forEach(b => {
    b.addEventListener('click', () => {
      F[fn] = b.dataset.v;
      g.querySelectorAll('.fb').forEach(x => x.classList.remove('a'));
      b.classList.add('a'); EK = null; rg();
    });
  });
});
document.getElementById('si').addEventListener('input', e => { S = e.target.value.toLowerCase(); EK = null; rg(); });

(async () => {
  loadPhotos();
  let d = await load(CSV_URL);
  M = d || [];
  rs(); rtl(); rg(); rgal();
})();
</script>
</body></html>
